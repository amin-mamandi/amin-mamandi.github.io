---
layout: default
---

<div class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
  
  <div class="post-content">
    {{ content }}
  </div>
  
  <div class="post-navigation">
    <a href="{{ site.baseurl }}/" class="back-link">← Back to Home</a>
  </div>
</div>
