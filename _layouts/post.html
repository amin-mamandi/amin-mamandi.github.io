---
layout: default
---

<div class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-date">{{ page.date | date: "%B %d, %Y" }}</p>
  
  <div class="post-content">
    {{ content }}
  </div>
  
  <div class="post-navigation">
    <a href="{{ site.baseurl }}/" class="nav-link">← Back to Home</a>
  </div>
</div>

<style>
  .post {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
  }
  
  .post-title {
    margin-bottom: 10px;
  }
  
  .post-date {
    color: #666;
    font-style: italic;
    margin-bottom: 30px;
  }
  
  .post-content {
    line-height: 1.6;
    margin-bottom: 40px;
  }
  
  .post-navigation {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }
  
  .nav-link {
    display: inline-block;
    padding: 8px 16px;
    background-color: #f8f8f8;
    text-decoration: none;
    border-radius: 4px;
    transition: background-color 0.3s;
  }
  
  .nav-link:hover {
    background-color: #e0e0e0;
  }
</style>
